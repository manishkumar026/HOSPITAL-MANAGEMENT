<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhéa Hospital - Password Recovery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #0066cc;
            --secondary: #003366;
            --accent: #ffcc00;
            --light: #f5f7fa;
            --dark: #333;
            --gray: #ddd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
            padding: 20px;
        }

        .recovery-container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 40px;
            text-align: center;
        }

        .logo-header {
            margin-bottom: 25px;
        }

        .logo-header i {
            color: var(--primary);
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .logo-header h2 {
            color: var(--secondary);
            font-size: 1.6rem;
            font-weight: bold;
        }

        .instructions {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #444;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid var(--gray);
            border-radius: 6px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        .btn {
            display: block;
            width: 100%;
            background-color: var(--primary);
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            margin-bottom: 15px;
        }

        .btn:hover {
            background-color: var(--secondary);
            transform: translateY(-2px);
        }

        .back-link {
            display: inline-block;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: var(--secondary);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="recovery-container">
        <div class="logo-header">
            <i class="fas fa-key"></i>
            <h2>Password Recovery</h2>
        </div>
        <p class="instructions">
            Enter the username or email address associated with your profile. We will verify your credentials and dispatch recovery instructions right away.
        </p>
        <form id="recovery-form">
            <div class="form-group">
                <label for="recovery-identifier">Username or Email</label>
                <input type="text" id="recovery-identifier" placeholder="e.g. sarah or sarah@gmail.com" required>
            </div>
            <button type="submit" class="btn">Send Verification Link</button>
        </form>
        <a href="multirole.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Portal Selector</a>
    </div>

    <script>
        document.getElementById('recovery-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const val = document.getElementById('recovery-identifier').value.trim();
            alert(`A verification link and security token have been dispatched to the email associated with "${val}". We will now open your Google Mail inbox so you can view it.`);
            
            // Open Google Mail in a new tab
            window.open('https://mail.google.com', '_blank');
            
            this.reset();
            window.location.href = 'multirole.html';
        });
    </script>
</body>
</html>
