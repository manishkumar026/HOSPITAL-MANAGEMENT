<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santhéa Hospital - Password Recovery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="theme.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .recovery-container {
            max-width: 460px;
            width: 100%;
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-3d);
            padding: 45px 40px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.02);
            transition: all 0.3s ease;
        }

        .recovery-container:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-3d-hover);
        }

        .logo-header {
            margin-bottom: 25px;
        }

        .logo-header i {
            color: var(--primary);
            font-size: 3.2rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 4px 6px var(--primary-glow));
        }

        .logo-header h2 {
            color: var(--secondary);
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .instructions {
            font-size: 0.95rem;
            color: var(--gray-dark);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--secondary);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.2s;
            padding: 8px 16px;
            border-radius: var(--border-radius-sm);
        }

        .back-link:hover {
            background-color: var(--primary-glow);
            color: var(--primary-hover);
        }
    </style>
</head>
<body>
    <div class="recovery-container">
        <div class="logo-header">
            <i class="fas fa-key"></i>
            <h2>Password Recovery</h2>
        </div>
        <p class="instructions">
            Enter the username or email address associated with your profile. We will verify your credentials and dispatch recovery instructions right away.
        </p>
        <form id="recovery-form">
            <div class="form-group">
                <label for="recovery-identifier">Username or Email</label>
                <input type="text" id="recovery-identifier" placeholder="e.g. sarah or sarah@gmail.com" required>
            </div>
            <button type="submit" class="btn btn-submit">Send Verification Link</button>
        </form>
        <a href="multirole.html" class="back-link"><i class="fas fa-arrow-left"></i> Return to Login</a>
    </div>

    <script>
        document.getElementById('recovery-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const val = document.getElementById('recovery-identifier').value.trim();
            alert(`A verification link and security token have been dispatched to the email associated with "${val}". We will now open your Google Mail inbox so you can view it.`);
            
            // Open Google Mail in a new tab
            window.open('https://mail.google.com', '_blank');
            
            this.reset();
            window.location.href = 'multirole.html';
        });
    </script>
</body>
</html>
